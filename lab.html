<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab | Sarun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space+Grotesk', sans-serif; background: #030712; color: #cbd5e1; }
        .bg-grid { background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 20px 20px; }
        .glow-text { text-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
    </style>
</head>
<body class="min-h-screen relative overflow-x-hidden">
    <div class="fixed inset-0 bg-grid z-0"></div>
    
    <nav class="relative z-10 px-8 py-6 flex justify-between items-center">
        <a href="index.html" class="text-xs tracking-[0.3em] uppercase hover:text-cyan-400 transition-colors">← Back_To_Main</a>
        <div class="text-xl font-bold tracking-tighter glow-text">LAB<span class="text-cyan-400">.01</span></div>
    </nav>

    <main class="relative z-10 max-w-7xl mx-auto px-8 py-16">
        <header class="mb-20">
            <h1 class="text-7xl font-bold tracking-tighter mb-4 glow-text uppercase">Experimental<br><span class="text-cyan-500">Playground</span></h1>
            <p class="text-slate-500 max-w-xl font-mono text-sm tracking-wider uppercase">A collection of technical prototypes, shader experiments, and unfinished thoughts.</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <!-- Lab Item 1 -->
            <div class="aspect-square bg-slate-900/50 border border-white/5 rounded-sm overflow-hidden group relative">
                <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500">
                <div class="absolute bottom-2 left-2 text-[8px] font-mono bg-slate-950 px-1 py-0.5 uppercase">EXP_001: Fluid_Sim</div>
            </div>
            <!-- Lab Item 2 -->
            <div class="aspect-square bg-slate-900/50 border border-white/5 rounded-sm overflow-hidden group relative">
                <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500">
                <div class="absolute bottom-2 left-2 text-[8px] font-mono bg-slate-950 px-1 py-0.5 uppercase">EXP_002: Encryption_UI</div>
            </div>
            <!-- Lab Item 3 -->
            <div class="aspect-square bg-slate-900/50 border border-white/5 rounded-sm overflow-hidden group relative">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all duration-500">
                <div class="absolute bottom-2 left-2 text-[8px] font-mono bg-slate-950 px-1 py-0.5 uppercase">EXP_003: Satellite_Viz</div>
            </div>
            <!-- Lab Item 4 -->
            <div class="aspect-square bg-slate-900/50 border border-white/5 rounded-sm overflow-hidden group relative">
                <div class="w-full h-full flex items-center justify-center text-slate-800 font-bold text-4xl">?</div>
                <div class="absolute bottom-2 left-2 text-[8px] font-mono bg-slate-950 px-1 py-0.5 uppercase">EXP_004: Incoming...</div>
            </div>
        </div>
    </main>

    <div class="fixed top-0 right-0 p-8 flex flex-col gap-1 text-[8px] font-mono text-slate-700 pointer-events-none">
        <div>X: 40.7128</div>
        <div>Y: 74.0060</div>
        <div>Z: ARCH_V2</div>
    </div>

</html>
